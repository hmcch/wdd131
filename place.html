<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mexico</title>
    <meta name="description"
        content="WDD 131 | Dynamic Web Fundamentals: A brief look of mexican weather data by Héctor Miguel Castro Chávez. Basic HTML structure, CSS and JS functionalities.">
    <meta name="author" content="Héctor Miguel Castro Chávez">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles/place.css">
    <link rel="icon" href="data:,"><!--Its valid HTML5 and prevents browsers to always look for the /favicon.ico.-->
    <script src="scripts/place.js" defer></script>
</head>

<body>
    <header>
        <h1>Mexico</h1>
    </header>
    <main>
        <div class="hero">
            <picture>
                <source srcset="images/golden-eagle-large-opt.webp" media="(min-width: 900px)">
                <source srcset="images/golden-eagle-med-opt.webp" media="(min-width: 500px)">
                <img src="images/golden-eagle-small-opt.webp" alt="Golden Eagle eating a snake" width="300"
                    height="259">
            </picture>
            <div class="initial-content">
                <section class="card-info">
                    <h2>Data</h2>
                    <div class="card-details">
                        <p><strong>Area:</strong> 1.964 million sq km</p>
                        <p><strong>Population:</strong> 132.7 million</p>
                        <p><strong>Capital:</strong> Mexico City</p>
                        <p><strong>Languages:</strong> Spanish</p>
                        <p><strong>Currency:</strong> Mexican Peso</p>
                        <p><strong>Time Zone:</strong> GMT-06</p>
                        <p><strong>Calling Code:</strong> +52</p>
                        <p><strong>Internet TLD:</strong> .mx</p>
                    </div>
                </section>
                <section class="weather-info">
                    <h2>Weather</h2>
                    <div class="weather-mobile-first-icon">
                        <img src="images/weather-icon-or.svg" alt="slightly cloudy weather icon" width="50" height="50">
                    </div>
                    <div class="card-details">
                        <p><strong>Temperature:</strong> <span id="temp">29</span> °C</p>
                        <p><strong>Wind:</strong> <span id="speed">11</span> km/h</p>
                        <p><strong>Wind Chill:</strong> <span id="chill"></span></p>
                    </div>
                </section>
            </div>
        </div>

    </main>
    <footer>
        <p class="footer">
            &copy; <span id="currentyear"></span> 🦅 Héctor Miguel Castro Chávez 🦅 Mexico
        </p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
