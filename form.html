<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preload" href="styles/form.css" as="style">
    <link rel="stylesheet" href="styles/form.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description"
        content="WDD 131 Dynamic Web Fundamentals: A product review form by Héctor Miguel Castro Chávez. Features HTML, CSS and dynamic JavaScript functionality.">
    <meta name="author" content="Héctor Miguel Castro Chávez">
    <link rel="icon" href="data:,"><!--Its valid HTML5 and prevents browsers to always look for the /favicon.ico.-->
    <script src="scripts/form.js" defer></script>

</head>

<body>
    <header>
        <h1>
            Product Review
        </h1>
    </header>
    <main>
        <form method="get" action="review.html" class="review-form">
            <div class="form-group">
                <label for="productName">Product Name</label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Select a Product...</option>
                </select>
            </div>
            <fieldset class="form-group rating-fieldset">
                <legend>Overall Rating</legend>
                <div class="rating-row">
                    <div class="rating-option">
                        <label for="rating1">☆</label>
                        <input type="radio" id="rating1" name="rating" value="1" required>
                    </div>
                    <div class="rating-option">
                        <label for="rating2">☆☆</label>
                        <input type="radio" id="rating2" name="rating" value="2" required>
                    </div>
                    <div class="rating-option">
                        <label for="rating3">☆☆☆</label>
                        <input type="radio" id="rating3" name="rating" value="3" required>
                    </div>
                    <div class="rating-option">
                        <label for="rating4">☆☆☆☆</label>
                        <input type="radio" id="rating4" name="rating" value="4" required>
                    </div>
                    <div class="rating-option">
                        <label for="rating5">☆☆☆☆☆</label>
                        <input type="radio" id="rating5" name="rating" value="5" required>
                    </div>
                </div>
            </fieldset>

            <div class="form-group">
                <label for="installDate">Date of Installation</label>
                <input type="date" id="installDate" name="installDate" required>
            </div>

            <fieldset class="form-group features-fieldset">
                <legend>Which features did you find useful in the product?<br><span>(Check all that apply)</span>
                </legend>

                <label for="durability" class="checkbox-label">
                    <input type="checkbox" id="durability" name="features" value="durability">Durability
                </label>
                <label for="easeOfUse" class="checkbox-label">
                    <input type="checkbox" id="easeOfUse" name="features" value="easeOfUse">Ease of Use
                </label>
                <label for="performance" class="checkbox-label">
                    <input type="checkbox" id="performance" name="features" value="performance">Performance
                </label>
                <label for="design" class="checkbox-label">
                    <input type="checkbox" id="design" name="features" value="design">Design
                </label>
            </fieldset>

            <div class="form-group">
                <label for="writtenReview">Written Review <span>(Optional)</span></label>
                <textarea id="writtenReview" name="writtenReview" rows="5"></textarea>
            </div>
            <div class="form-group">
                <label for="userName">Your Name <span>(Optional)</span></label>
                <input type="text" id="userName" name="userName" autocomplete="name">
            </div>
            <div class="form-group">
                <input type="submit" value="Post Review" class="submit-btn">
            </div>
        </form>
    </main>
    <footer>
        <p>&copy;2026 🦅 Héctor Miguel Castro Chávez 🦅 Mexico</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
