<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Bike Club Eterna Primavera - Routes</title>
    <meta name="description" content="WDD 131 | Dynamic Web Fundamentals: Final project by Héctor Miguel Castro Chávez. HTML, CSS and JS
    functionalities. Routes page.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:,"><!--Its valid HTML5 and prevents browsers to always look for the /favicon.ico.-->

    <script src="script.js" defer></script>
</head>

<body>
    <header id="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <div>
                        <div class="logo-title">E-Bike Club</div>
                        <div class="logo-subtitle">Eterna Primavera</div>
                    </div>
                </a>

                <nav class="desktop-nav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="routes.html" class="nav-link active">Routes</a>
                    <a href="contact.html" class="nav-link">Join Us</a>
                    <a href="referencias.html" class="nav-link">References</a>
                </nav>

                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <span class="icon icon-menu" id="menuIcon"></span>
                    <span class="icon icon-close hidden" id="closeIcon"></span>
                </button>
            </div>

            <nav class="mobile-nav hidden" id="mobileNav">
                <a href="index.html" class="mobile-nav-link">Home</a>
                <a href="routes.html" class="mobile-nav-link active">Routes</a>
                <a href="contact.html" class="mobile-nav-link">Join Us</a>
                <a href="referencias.html" class="mobile-nav-link">References</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h1 class="page-title">Discover the Routes</h1>
                <p class="page-description">Whether you're looking for a leisurely stroll, something in between, or an
                    extreme adventure, we always have an option
                    for you.</p>
            </div>
        </section>

        <section class="filters-section">
            <div class="container">
                <div class="filters-container">
                    <div class="filters-row">
                        <label for="difficultyFilter" class="filter-label">Level of Difficulty</label>
                        <select id="difficultyFilter" class="filter-select">
                            <option value="all">All options</option>
                            <option value="Easy">Easy</option>
                            <option value="Moderate">Moderate</option>
                            <option value="Challenging">Challenging/Extreme</option>
                        </select>
                    </div>
                </div>
            </div>
            </div>
        </section>

        <section class="routes-section">
            <div class="container">
                <div id="routesGrid" class="routes-grid"></div>
            </div>
        </section>
        </div>

        <section class="contact-section">
            <div class="container">
                <div class="centered-button-container">
                    <a href="contact.html" class="btn btn-primary btn-member">Contact Us</a>
                </div>
            </div>
        </section>
    </main>

    <footer id="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Héctor Miguel Castro Chávez</p>
            </div>
        </div>
    </footer>

</body>

</html>
